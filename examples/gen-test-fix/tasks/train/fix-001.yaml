id: fix-001
category: fix
input: |
  아래 코드는 테스트를 통과하지 못한다. 버그를 찾아 수정해라.
  수정된 함수 코드만 출력할 것.

  ```python
  def is_palindrome(s: str) -> bool:
      """문자열이 팰린드롬이면 True."""
      s = s.lower()
      return s == s[::-1]  # 공백과 특수문자를 제거하지 않음
  ```

  실패하는 테스트:
  ```python
  assert is_palindrome("A man a plan a canal Panama") == True
  assert is_palindrome("race a car") == False
  assert is_palindrome("Was it a car or a cat I saw") == True
  ```
expected: pytest_pass
scorer_hint: >
  에이전트 출력에서 수정된 is_palindrome 함수 추출.
  위 3개 assert를 포함한 테스트 파일 생성 후 pytest 실행.
  exit code 0이면 1.0.
