id: fix-003
category: fix
input: |
  아래 코드는 테스트를 통과하지 못한다. 버그를 찾아 수정해라.
  수정된 함수 코드만 출력할 것.

  ```python
  def count_words(text: str) -> dict:
      """텍스트에서 단어별 출현 횟수를 반환한다. 대소문자 구분 없음."""
      words = text.split()
      counts = {}
      for word in words:
          counts[word] = counts.get(word, 0) + 1  # 소문자 정규화 누락
      return counts
  ```

  실패하는 테스트:
  ```python
  result = count_words("Hello hello HELLO world")
  assert result == {"hello": 3, "world": 1}

  result = count_words("The the THE")
  assert result == {"the": 3}
  ```
expected: pytest_pass
scorer_hint: >
  에이전트 출력에서 수정된 count_words 함수 추출.
  위 assert를 포함한 테스트 파일 생성 후 pytest 실행.
  exit code 0이면 1.0.
